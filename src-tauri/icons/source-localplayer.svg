<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fb7185"/>
      <stop offset="0.55" stop-color="#e11d48"/>
      <stop offset="1" stop-color="#9f1239"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect x="80" y="80" width="864" height="864" rx="200" fill="url(#bg)"/>
  <rect x="80" y="80" width="864" height="864" rx="200" fill="url(#glow)"/>

  <!-- disco / lente sutil -->
  <circle cx="512" cy="470" r="300" fill="#000" opacity="0.12"/>
  <circle cx="512" cy="470" r="300" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="10"/>

  <!-- play -->
  <path d="M430 330 L708 470 L430 610 Z" fill="#ffffff" filter="url(#sh)"/>

  <!-- easter egg: "Taylor" cursivo -->
  <text x="512" y="852" text-anchor="middle"
        font-family="'Segoe Script','Brush Script MT',cursive"
        font-size="120" font-style="italic" fill="#ffffff" fill-opacity="0.9">Taylor</text>
</svg>
